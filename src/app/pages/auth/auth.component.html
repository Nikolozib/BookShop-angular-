<div class="auth-page">
  <div class="auth-card">
    <a routerLink="/" class="auth-logo">
      <i class="fa-solid fa-book-open-reader"></i> PageTurn
    </a>

    <div class="auth-tabs">
      <button class="tab-btn" [class.active]="activeTab() === 'login'" (click)="setTab('login')">Sign In</button>
      <button class="tab-btn" [class.active]="activeTab() === 'register'" (click)="setTab('register')">Register</button>
    </div>

    @if (activeTab() === 'login') {
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" class="form-control" placeholder="JonDoe@gmail.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input [type]="showLoginPwd() ? 'text' : 'password'" formControlName="password" class="form-control" placeholder="Your password">
            <button type="button" class="toggle-password" (click)="toggleLoginPwd()">
              <i [class]="showLoginPwd() ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
            </button>
          </div>
        </div>
        <button type="button" class="forgot-link" (click)="forgotPassword()">Forgot password?</button>
        @if (loginMsg()) {
          <p class="form-msg" [class.success]="!loginError()" [class.error]="loginError()">{{ loginMsg() }}</p>
        }
        <button type="submit" class="form-submit" [disabled]="loading()">
          @if (loading()) { <i class="fa-solid fa-spinner fa-spin"></i> Signing in... }
          @else { <i class="fa-solid fa-right-to-bracket"></i> Sign In }
        </button>
      </form>
    }

    @if (activeTab() === 'register') {
      <form [formGroup]="registerForm" (ngSubmit)="register()">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="name" class="form-control" placeholder="Jon Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" class="form-control" placeholder="JonDoe@gmail.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input [type]="showRegPwd() ? 'text' : 'password'" formControlName="password" class="form-control" placeholder="Min. 6 characters">
            <button type="button" class="toggle-password" (click)="toggleRegPwd()">
              <i [class]="showRegPwd() ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input [type]="showRegConfirm() ? 'text' : 'password'" formControlName="confirm" class="form-control" placeholder="Repeat password">
            <button type="button" class="toggle-password" (click)="toggleRegConfirm()">
              <i [class]="showRegConfirm() ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
            </button>
          </div>
        </div>
        @if (registerMsg()) {
          <p class="form-msg" [class.success]="!registerError()" [class.error]="registerError()">{{ registerMsg() }}</p>
        }
        <button type="submit" class="form-submit" [disabled]="loading()">
          @if (loading()) { <i class="fa-solid fa-spinner fa-spin"></i> Creating account... }
          @else { <i class="fa-solid fa-user-plus"></i> Create Account }
        </button>
      </form>
    }

    <p class="back-link"><a routerLink="/"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
  </div>
</div>
