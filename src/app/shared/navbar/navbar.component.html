<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar-inner">
    <a routerLink="/" class="nav-logo">
      <i class="fa-solid fa-book-open-reader"></i> PageTurn
    </a>

    <ul class="nav-links" [class.open]="mobileOpen()">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link" (click)="closeMobile()">Home</a></li>
      <li><a routerLink="/shop" routerLinkActive="active" class="nav-link" (click)="closeMobile()">Shop</a></li>
      <li><a routerLink="/about" routerLinkActive="active" class="nav-link" (click)="closeMobile()">About</a></li>
      @if (isAdmin()) {
        <li><a routerLink="/admin" routerLinkActive="active" class="nav-link" (click)="closeMobile()">Admin</a></li>
      }
    </ul>

    <div class="nav-actions">
      <a routerLink="/cart" class="nav-icon-btn" title="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
        @if (cartService.totalCount() > 0) {
          <span class="cart-badge">{{ cartService.totalCount() }}</span>
        }
      </a>

      @if (authService.currentUser$ | async; as user) {
        <div class="nav-user-menu">
          <div class="nav-user-toggle" (click)="toggleDropdown()">
            <i class="fa-solid fa-circle-user"></i>
            <span>{{ user.displayName || user.email }}</span>
            <i class="fa-solid fa-chevron-down" style="font-size:0.7rem"></i>
          </div>
          <div class="nav-dropdown" [class.open]="dropdownOpen()">
            <button (click)="logout()">
              <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
          </div>
        </div>
      } @else {
        <a routerLink="/auth" class="btn-nav-login">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </a>
      }

      <button class="menu-toggle" [class.active]="mobileOpen()" (click)="toggleMobile()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
